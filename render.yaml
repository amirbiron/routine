services:
  - type: web
    name: routine-anchors
    runtime: node
    plan: starter
    buildCommand: pnpm install && drizzle-kit push --force --verbose && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "3000"
