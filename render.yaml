services:
  - type: web
    name: routine-anchors
    runtime: node
    plan: starter
    buildCommand: pnpm install && node -e "const m=require('mysql2/promise');(async()=>{const c=await m.createConnection(process.env.DATABASE_URL);await c.query('ALTER TABLE users ADD UNIQUE INDEX users_email_unique (email)').catch(()=>{});await c.end()})()" && drizzle-kit push && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "3000"
